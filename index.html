<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokempô</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <main class="container">
        <div>
            <div class="results">
                <div>
                    <span class="user-result">
                        <img src="./images/pedra.png" alt="escolha do usuario">
                    </span>

                    <span class="computer-result">
                        <img src="./images/pedra.png" alt="escolha do computador">
                    </span>
                </div>
                <p class="result-text">Bora Jogar?</p>
            </div>

            <div class="options">
                <span class="option-image">
                    <img src="./images/pedra.png" alt="imagem Pedra">
                    <p>Pedra</p>
                </span>

                <span class="option-image">
                    <img src="./images/papel.png" alt="imagem Papel">
                    <p>Papel</p>
                </span>

                <span class="option-image">
                    <img src="./images/tesoura.png" alt="imagem Tesoura">
                    <p>Tesoura</p>
                </span>

            </div>
        </div>

    </main>
</body>
<script src="./scripts.js"></script>
</html>
